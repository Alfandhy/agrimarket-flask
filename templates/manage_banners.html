{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Kelola Banner Promo</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addBannerModal">+ Tambah
                Banner</button>
        </div>

        <div class="row row-cols-1 row-cols-md-2 g-4">
            {% for banner in banners %}
            <div class="col">
                <div class="card h-100 shadow-sm border-0">
                    <img src="{{ url_for('static', filename='uploads/' + banner.image_filename) }}" class="card-img-top"
                        alt="Banner" style="height: 180px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">{{ banner.title }}</h5>
                        <p class="card-text text-muted">{{ banner.subtitle }}</p>
                    </div>
                    <div class="card-footer bg-white d-flex justify-content-between align-items-center border-0">
                        <form action="{{ url_for('admin.toggle_banner', id=banner.id) }}" method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button type="submit"
                                class="btn btn-sm {{ 'btn-success' if banner.is_active else 'btn-secondary' }}">
                                {{ 'Active' if banner.is_active else 'Inactive' }}
                            </button>
                        </form>

                        <form action="{{ url_for('admin.delete_banner', id=banner.id) }}" method="POST"
                            onsubmit="return confirm('Hapus banner ini?');">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Hapus</button>
                        </form>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12 text-center py-5">
                <p class="text-muted">Belum ada banner promo.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="addBannerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Tambah Banner Baru</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" enctype="multipart/form-data">
                <div class="modal-body">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Judul Utama</label>
                        <input type="text" class="form-control" name="title" required
                            placeholder="Contoh: Diskon Spesial Lebaran">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sub Judul (Opsional)</label>
                        <input type="text" class="form-control" name="subtitle" placeholder="Contoh: Hemat hingga 50%">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Gambar Banner</label>
                        <input type="file" class="form-control" name="image" required accept="image/*">
                        <div class="form-text">Rekomendasi ukuran: 1200x400px (Landscape)</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
